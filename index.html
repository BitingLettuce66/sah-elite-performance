<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0B0B0C" />
  <meta name="color-scheme" content="dark" />
  <title>SAH Elite Performance</title>
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SAH Elite" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <h1 class="brand">SAH <span>Elite Performance</span></h1>
      <div class="top-right">
        <div id="phase" class="phase"></div>
        <button id="settings-btn" aria-label="Settings"><span aria-hidden="true">⚙</span></button>
      </div>
    </header>

    <main id="view" aria-live="polite">
      <div class="loading" role="status" aria-label="Loading"><span class="spinner"></span></div>
    </main>

    <nav id="tabbar" aria-label="Primary">
      <button data-view="today" class="active" aria-label="Today"><span class="ic" aria-hidden="true">◎</span>Today</button>
      <button data-view="history" aria-label="History"><span class="ic" aria-hidden="true">▤</span>History</button>
      <button data-view="progress" aria-label="Progress"><span class="ic" aria-hidden="true">▰</span>Progress</button>
      <button data-view="share" aria-label="Share"><span class="ic" aria-hidden="true">↗</span>Share</button>
    </nav>
  </div>

  <div id="modal" class="modal hidden"><div class="sheet" id="sheet" role="dialog" aria-modal="true" tabindex="-1"></div></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
