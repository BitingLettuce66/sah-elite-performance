<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0B0B0C" />
  <meta name="color-scheme" content="dark" />
  <title>SAH Elite Performance</title>
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SAH Elite" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="brand">SAH <span>Elite Performance</span></div>
      <div id="phase" class="phase"></div>
    </header>

    <main id="view"></main>

    <nav id="tabbar">
      <button data-view="today" class="active"><span class="ic">◎</span>Today</button>
      <button data-view="history"><span class="ic">▤</span>History</button>
      <button data-view="progress"><span class="ic">▰</span>Progress</button>
      <button data-view="share"><span class="ic">↗</span>Share</button>
    </nav>
  </div>

  <div id="modal" class="modal hidden"><div class="sheet" id="sheet"></div></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
